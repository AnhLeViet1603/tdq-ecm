<!-- ════════════════════════════════════════════════════════════
     AUTH SCREEN — partials/auth.html
     Màn hình đăng nhập và đăng ký
════════════════════════════════════════════════════════════ -->
<div id="auth" class="auth-screen">
  <div class="auth-bg"></div>
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">⚡</div>
      <h1>SHOPPE.VN</h1>
    </div>

    <div class="auth-tabs" role="tablist">
      <button class="tab active" data-tab="login" id="tab-login">Đăng nhập</button>
      <button class="tab" data-tab="register" id="tab-register">Đăng ký</button>
    </div>

    <!-- ── Login Form ─────────────────────────────────────────── -->
    <form id="login-form" class="auth-form" novalidate>
      <div class="field">
        <label for="login-email">Email</label>
        <input
          type="email"
          id="login-email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>
      <div class="field">
        <label for="login-password">Mật khẩu</label>
        <input
          type="password"
          id="login-password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>
      <div id="login-error" class="error-msg hidden"></div>
      <button type="submit" class="btn-primary btn-full" id="login-btn">
        <span id="login-btn-text">Đăng nhập</span>
      </button>
    </form>

    <!-- ── Register Form ──────────────────────────────────────── -->
    <form id="register-form" class="auth-form hidden" novalidate>
      <div class="field">
        <label for="reg-name">Họ và tên</label>
        <input
          type="text"
          id="reg-name"
          placeholder="Nguyễn Văn A"
          autocomplete="name"
          required
        />
      </div>
      <div class="field">
        <label for="reg-email">Email</label>
        <input
          type="email"
          id="reg-email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>
      <div class="field">
        <label for="reg-password">Mật khẩu</label>
        <input
          type="password"
          id="reg-password"
          placeholder="Tối thiểu 8 ký tự"
          autocomplete="new-password"
          required
        />
      </div>
      <div class="field">
        <label for="reg-confirm">Xác nhận mật khẩu</label>
        <input
          type="password"
          id="reg-confirm"
          placeholder="••••••••"
          autocomplete="new-password"
          required
        />
      </div>
      <div id="reg-error" class="error-msg hidden"></div>
      <button type="submit" class="btn-primary btn-full" id="reg-btn">
        <span id="reg-btn-text">Tạo tài khoản</span>
      </button>
    </form>

  </div>
</div>
